<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexCare KIS – Dashboard Demo</title>
    <style>

        :root {
            --color-bg:              #EDF5FF;
            --color-surface:         #FFFFFF;
            --color-surface-2:       #F5F9FF;
            --color-border:          rgba(60,60,67,.12);
            --color-border-light:    rgba(60,60,67,.07);
            --color-primary:         #007AFF;
            --color-primary-dark:    #0062CC;
            --color-primary-soft:    rgba(0,122,255,.10);
            --color-success:         #34C759;
            --color-success-soft:    rgba(52,199,89,.12);
            --color-warning:         #FF9500;
            --color-warning-soft:    rgba(255,149,0,.12);
            --color-danger:          #FF3B30;
            --color-danger-soft:     rgba(255,59,48,.10);
            --color-purple:          #AF52DE;
            --color-purple-soft:     rgba(175,82,222,.10);
            --color-text:            #1C1C1E;
            --color-text-secondary:  #3A3A3C;
            --color-text-muted:      #8E8E93;
            --color-text-placeholder:#AEAEB2;
            --color-sidebar:         #1A2740;
            --sidebar-width:         260px;
            --sidebar-width-collapsed: 64px;
            --radius-xs:  4px;
            --radius-sm:  8px;
            --radius-md:  12px;
            --radius-lg:  16px;
            --radius-xl:  20px;
            --radius-2xl: 28px;
            --shadow-xs:  0 1px 2px rgba(0,0,0,.05);
            --shadow-sm:  0 1px 3px rgba(0,0,0,.06), 0 1px 6px rgba(0,0,0,.04);
            --shadow-md:  0 4px 16px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.04);
            --shadow-lg:  0 8px 28px rgba(0,0,0,.10), 0 2px 8px rgba(0,0,0,.05);
            --shadow-xl:  0 20px 60px rgba(0,0,0,.14), 0 4px 16px rgba(0,0,0,.06);
            --font-sans: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display',
            'Helvetica Neue', Arial, sans-serif;
            --ease:        cubic-bezier(.4, 0, .2, 1);
            --ease-out:    cubic-bezier(0, 0, .2, 1);
            --ease-spring: cubic-bezier(.34, 1.4, .64, 1);
            --t-fast:  0.12s;
            --t-base:  0.2s;
            --t-slow:  0.32s;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            font-family: var(--font-sans);
            font-size: 14px;
            line-height: 1.5;
            color: var(--color-text);
            background: var(--color-bg);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }
        a { color: inherit; text-decoration: none; }
        button { cursor: pointer; font-family: inherit; }
        img, svg { display: block; }

        /* ── Layout ──────────────────────────────────────────────────────────── */
        .layout {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        .layout__content {
            flex: 1;
            min-width: 0;
            padding: 40px 44px;
            overflow-y: auto;
            background: var(--color-bg);
        }

        /* ── Sidebar ─────────────────────────────────────────────────────────── */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--color-sidebar);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow: hidden;
            transition: width var(--t-base) var(--ease);
        }
        .sidebar__brand {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 20px 16px 18px;
            border-bottom: 1px solid rgba(255,255,255,.06);
            flex-shrink: 0;
        }
        .sidebar__brand-inner {
            display: flex;
            align-items: center;
            gap: 10px;
            overflow: hidden;
            min-width: 0;
        }
        .sidebar__logo-icon {
            width: 30px;
            height: 30px;
            background: var(--color-primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .sidebar__title {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.3px;
            white-space: nowrap;
            overflow: hidden;
        }
        .sidebar__collapse-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,.30);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            border-radius: var(--radius-xs);
            cursor: pointer;
            transition: color var(--t-fast), background var(--t-fast);
            flex-shrink: 0;
        }
        .sidebar__collapse-btn:hover { color: rgba(255,255,255,.75); background: rgba(255,255,255,.08); }

        .sidebar__nav {
            flex: 1;
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: none;
        }
        .sidebar__nav::-webkit-scrollbar { display: none; }

        .sidebar__item {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            color: rgba(235,235,245,.65);
            font-size: 13.5px;
            font-weight: 500;
            transition: background var(--t-fast) var(--ease), color var(--t-fast) var(--ease);
            white-space: nowrap;
            overflow: hidden;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            cursor: default;
        }
        .sidebar__item svg { flex-shrink: 0; opacity: .75; transition: opacity var(--t-fast); }
        .sidebar__item-label { overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
        .sidebar__item:hover {
            background: rgba(255,255,255,.07);
            color: rgba(255,255,255,.90);
        }
        .sidebar__item:hover svg { opacity: 1; }
        .sidebar__item--active {
            background: rgba(0,122,255,.20);
            color: #fff;
        }
        .sidebar__item--active svg { opacity: 1; color: #5AC8FA; }

        .sidebar__footer {
            padding: 10px 12px 14px;
            border-top: 1px solid rgba(255,255,255,.06);
            flex-shrink: 0;
        }
        .sidebar__user-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: var(--radius-sm);
            transition: background var(--t-fast);
            flex: 1;
            min-width: 0;
        }
        .sidebar__user-card-wrap {
            display: flex;
            align-items: center;
        }
        .sidebar__avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0A84FF, #5AC8FA);
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 0 0 2px rgba(90,200,250,.25);
        }
        .sidebar__user-info { flex: 1; min-width: 0; overflow: hidden; }
        .sidebar__user-name {
            font-size: 13px;
            font-weight: 600;
            color: rgba(255,255,255,.90);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
        }
        .sidebar__user-role {
            font-size: 11px;
            color: rgba(255,255,255,.38);
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sidebar__logout {
            background: none;
            border: none;
            color: rgba(255,255,255,.28);
            display: flex;
            align-items: center;
            padding: 5px;
            border-radius: var(--radius-xs);
            transition: color var(--t-fast), background var(--t-fast);
            flex-shrink: 0;
        }
        .sidebar__logout:hover { color: var(--color-danger); background: rgba(255,59,48,.10); }

        /* Collapsed */
        .sidebar--collapsed { width: var(--sidebar-width-collapsed); }
        .sidebar--collapsed .sidebar__brand { padding: 20px 0 18px; justify-content: center; }
        .sidebar--collapsed .sidebar__brand-inner { display: none; }
        .sidebar--collapsed .sidebar__nav { padding: 12px 8px; }
        .sidebar--collapsed .sidebar__item { justify-content: center; padding: 10px 0; gap: 0; }
        .sidebar--collapsed .sidebar__item-label { display: none; }
        .sidebar--collapsed .sidebar__footer { padding: 10px 8px 14px; }
        .sidebar--collapsed .sidebar__user-card {
            flex-direction: column; padding: 8px 6px; gap: 8px; align-items: center;
        }
        .sidebar--collapsed .sidebar__user-info { display: none; }
        .sidebar--collapsed .sidebar__logout { padding: 4px; }

        /* Mobile backdrop */
        .sidebar-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.50);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            z-index: 99;
        }
        .sidebar-backdrop--visible { display: block; }

        /* ── Dashboard ───────────────────────────────────────────────────────── */
        .dashboard { max-width: 1200px; }
        .dashboard__header { margin-bottom: 36px; }
        .dashboard__title {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.8px;
            color: var(--color-text);
            line-height: 1.1;
        }
        .dashboard__subtitle {
            font-size: 15px;
            color: var(--color-text-muted);
            margin-top: 6px;
            font-weight: 400;
        }
        .dashboard__grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(248px, 1fr));
            gap: 20px;
        }

        /* ── Dashboard Cards ─────────────────────────────────────────────────── */
        .dashboard-card {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-xl);
            padding: 28px;
            text-align: left;
            cursor: pointer;
            transition:
                    box-shadow var(--t-base) var(--ease),
                    border-color var(--t-base) var(--ease),
                    transform var(--t-base) var(--ease-spring);
            overflow: hidden;
            position: relative;
            font-family: inherit;
            width: 100%;
        }
        .dashboard-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--color-primary-soft) 0%, transparent 60%);
            opacity: 0;
            transition: opacity var(--t-base) var(--ease);
            pointer-events: none;
        }
        .dashboard-card:hover {
            box-shadow: var(--shadow-lg);
            border-color: rgba(0,122,255,.25);
            transform: translateY(-3px);
        }
        .dashboard-card:hover::before { opacity: 1; }
        .dashboard-card:active { transform: translateY(-1px); box-shadow: var(--shadow-md); }

        .dashboard-card__icon-wrap {
            width: 60px;
            height: 60px;
            border-radius: var(--radius-md);
            background: var(--color-primary-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
            color: var(--color-primary);
            transition: background var(--t-base), transform var(--t-base) var(--ease-spring);
        }
        .dashboard-card:hover .dashboard-card__icon-wrap {
            background: var(--color-primary);
            color: #fff;
            transform: scale(1.06);
        }
        .dashboard-card__label {
            font-size: 15px;
            font-weight: 600;
            color: var(--color-text);
            letter-spacing: -0.2px;
            line-height: 1.3;
            word-break: break-word;
            overflow-wrap: anywhere;
            width: 100%;
        }
        .dashboard-card__action {
            font-size: 13px;
            color: var(--color-primary);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 20px;
        }
        .dashboard-card__action::after {
            content: '→';
            display: inline-block;
            transition: transform var(--t-fast) var(--ease);
        }
        .dashboard-card:hover .dashboard-card__action::after { transform: translateX(4px); }

        /* ── Hamburger ───────────────────────────────────────────────────────── */
        .layout__hamburger {
            display: none;
            align-items: center;
            gap: 10px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            color: var(--color-text-secondary);
            padding: 9px 14px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-xs);
            font-size: 14px;
            font-weight: 500;
            transition: background var(--t-fast), box-shadow var(--t-fast);
            cursor: pointer;
        }
        .layout__hamburger:hover { background: var(--color-bg); box-shadow: var(--shadow-sm); }

        /* ── Responsive ──────────────────────────────────────────────────────── */
        @media (max-width: 768px) {
            .layout__content { padding: 20px 16px; }
            .layout__hamburger { display: flex; }
            .sidebar {
                position: fixed !important;
                left: 0; top: 0; bottom: 0;
                z-index: 100;
                width: var(--sidebar-width) !important;
                transform: translateX(-100%);
                transition: transform var(--t-base) var(--ease), box-shadow var(--t-base) var(--ease);
                box-shadow: none;
            }
            .sidebar--mobile-open {
                transform: translateX(0);
                box-shadow: var(--shadow-xl);
            }
            .sidebar--mobile-open .sidebar__brand { padding: 20px 16px 18px !important; justify-content: space-between !important; }
            .sidebar--mobile-open .sidebar__brand-inner { display: flex !important; }
            .sidebar--mobile-open .sidebar__nav { padding: 12px 10px !important; }
            .sidebar--mobile-open .sidebar__item { justify-content: flex-start !important; padding: 8px 12px !important; gap: 9px !important; }
            .sidebar--mobile-open .sidebar__item-label { display: unset !important; }
            .sidebar--mobile-open .sidebar__footer { padding: 10px 12px 14px !important; }
            .sidebar--mobile-open .sidebar__user-card { flex-direction: row !important; align-items: center !important; padding: 8px 10px !important; gap: 10px !important; }
            .sidebar--mobile-open .sidebar__user-info { display: block !important; }
            .dashboard__grid { grid-template-columns: 1fr 1fr !important; gap: 14px !important; }
        }
        @media (max-width: 480px) {
            .layout__content { padding: 16px 12px; }
            .dashboard__grid { grid-template-columns: 1fr !important; gap: 12px !important; }
            .dashboard-card { padding: 22px !important; }
        }

        /* Demo badge */
        .demo-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(175,82,222,.12);
            border: 1px solid rgba(175,82,222,.20);
            border-radius: 99px;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 600;
            color: #AF52DE;
            letter-spacing: .05em;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>

<div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar__brand">
            <div class="sidebar__brand-inner">
                <div class="sidebar__logo-icon">
                    <svg width="18" height="18" viewBox="0 0 26 26" fill="none">
                        <rect x="9.5" y="1" width="7" height="24" rx="3.5" fill="white"/>
                        <rect x="1" y="9.5" width="24" height="7" rx="3.5" fill="white"/>
                    </svg>
                </div>
                <span class="sidebar__title">NexCare</span>
            </div>
            <button class="sidebar__collapse-btn" id="collapseBtn" title="Einklappen" onclick="toggleSidebar()">
                <svg id="chevronIcon" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="transition: transform 0.2s;">
                    <path d="M10 12L6 8l4-4"/>
                </svg>
            </button>
        </div>

        <nav class="sidebar__nav">
            <!-- Dashboard (active) -->
            <button class="sidebar__item sidebar__item--active">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <rect x="1" y="1" width="6" height="6" rx="1.5"/>
                    <rect x="9" y="1" width="6" height="6" rx="1.5"/>
                    <rect x="1" y="9" width="6" height="6" rx="1.5"/>
                    <rect x="9" y="9" width="6" height="6" rx="1.5"/>
                </svg>
                <span class="sidebar__item-label">Dashboard</span>
            </button>

            <!-- Bettenverwaltung -->
            <button class="sidebar__item">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <rect x="1" y="8" width="14" height="5" rx="1.5"/>
                    <rect x="3" y="4" width="5" height="4" rx="1"/>
                    <rect x="1" y="13" width="2" height="2" rx="1"/>
                    <rect x="13" y="13" width="2" height="2" rx="1"/>
                </svg>
                <span class="sidebar__item-label">Bettenverwaltung</span>
            </button>

            <!-- Medikamentenverwaltung -->
            <button class="sidebar__item">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <circle cx="8" cy="6" r="4"/>
                    <rect x="5" y="12" width="6" height="2" rx="1"/>
                    <rect x="4" y="14" width="8" height="1.5" rx=".75" opacity=".5"/>
                </svg>
                <span class="sidebar__item-label">Medikamentenverwaltung</span>
            </button>

            <!-- Benutzerverwaltung -->
            <button class="sidebar__item">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <circle cx="5.5" cy="5" r="2.5"/>
                    <path d="M1 13c0-2.5 2-4.5 4.5-4.5S10 10.5 10 13H1z"/>
                    <circle cx="12" cy="5" r="2" opacity=".6"/>
                    <path d="M10 13c0-1.8 1-3.4 2.5-4.2A4.5 4.5 0 0115 13h-5z" opacity=".6"/>
                </svg>
                <span class="sidebar__item-label">Benutzerverwaltung</span>
            </button>

            <!-- Krankenhäuser -->
            <button class="sidebar__item">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <rect x="2" y="6" width="12" height="9" rx="1.5"/>
                    <path d="M6 15v-4h4v4"/>
                    <path d="M0 9h2M14 9h2" opacity=".5"/>
                    <rect x="6" y="2" width="4" height="4" rx="1" opacity=".8"/>
                </svg>
                <span class="sidebar__item-label">Krankenhäuser</span>
            </button>

            <!-- Patientenverwaltung -->
            <button class="sidebar__item">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <circle cx="6" cy="4" r="3"/>
                    <path d="M0 14c0-3.3 2.7-6 6-6s6 2.7 6 6H0z"/>
                    <path d="M12 7v6M9 10h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <span class="sidebar__item-label">Patientenverwaltung</span>
            </button>

            <!-- Admin-Einstellungen -->
            <button class="sidebar__item">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <circle cx="8" cy="8" r="2.5"/>
                    <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.42 1.42M11.53 11.53l1.42 1.42M11.53 4.47l1.42-1.42M3.05 12.95l1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
                </svg>
                <span class="sidebar__item-label">Admin-Einstellungen</span>
            </button>
        </nav>

        <div class="sidebar__footer">
            <div class="sidebar__user-card-wrap">
                <div class="sidebar__user-card">
                    <div class="sidebar__avatar">A</div>
                    <div class="sidebar__user-info">
                        <div class="sidebar__user-name">Admin Benutzer</div>
                        <div class="sidebar__user-role">Administrator</div>
                    </div>
                </div>
                <button class="sidebar__logout" title="Abmelden">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                        <path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3"/>
                        <path d="M11 11l3-3-3-3"/>
                        <path d="M14 8H6"/>
                    </svg>
                </button>
            </div>
        </div>
    </aside>

    <!-- Mobile backdrop -->
    <div class="sidebar-backdrop" id="backdrop" onclick="closeMobileSidebar()"></div>

    <!-- Main Content -->
    <main class="layout__content">

        <!-- Hamburger (mobile) -->
        <button class="layout__hamburger" onclick="openMobileSidebar()">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                <path d="M2 4h14M2 9h14M2 14h14"/>
            </svg>
            Menü
        </button>

        <div class="dashboard">
            <header class="dashboard__header">
                <div class="demo-badge">
                    <svg width="8" height="8" viewBox="0 0 8 8" fill="currentColor"><circle cx="4" cy="4" r="4"/></svg>
                    Demo-Ansicht
                </div>
                <h1 class="dashboard__title">Guten Tag, Admin</h1>
                <p class="dashboard__subtitle">Übersicht und Schnellzugriff</p>
            </header>

            <div class="dashboard__grid">

                <!-- Bettenverwaltung -->
                <button class="dashboard-card">
          <span class="dashboard-card__icon-wrap">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="currentColor">
              <rect x="2" y="14" width="24" height="9" rx="3"/>
              <rect x="5" y="7" width="9" height="7" rx="2"/>
              <rect x="2" y="23" width="3" height="3" rx="1.5"/>
              <rect x="23" y="23" width="3" height="3" rx="1.5"/>
            </svg>
          </span>
                    <span class="dashboard-card__label">Bettenverwaltung</span>
                    <span class="dashboard-card__action">Öffnen</span>
                </button>

                <!-- Medikamentenverwaltung -->
                <button class="dashboard-card">
          <span class="dashboard-card__icon-wrap">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="currentColor">
              <circle cx="14" cy="11" r="7"/>
              <rect x="9" y="20" width="10" height="3" rx="1.5"/>
              <rect x="7" y="24" width="14" height="2" rx="1"/>
            </svg>
          </span>
                    <span class="dashboard-card__label">Medikamentenverwaltung</span>
                    <span class="dashboard-card__action">Öffnen</span>
                </button>

                <!-- Benutzerverwaltung -->
                <button class="dashboard-card">
          <span class="dashboard-card__icon-wrap">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="currentColor">

<script>
    var collapsed = false;

    function toggleSidebar() {
        var sidebar = document.getElementById('sidebar');
        var icon = document.getElementById('chevronIcon');
        // On mobile, just close
        if (window.innerWidth <= 768) {
            closeMobileSidebar();
            return;
        }
        collapsed = !collapsed;
        if (collapsed) {
            sidebar.classList.add('sidebar--collapsed');
            icon.style.transform = 'rotate(180deg)';
        } else {
            sidebar.classList.remove('sidebar--collapsed');
            icon.style.transform = 'none';
        }
    }

    function openMobileSidebar() {
        var sidebar = document.getElementById('sidebar');
        var backdrop = document.getElementById('backdrop');
        var collapseBtn = document.getElementById('collapseBtn');
        sidebar.classList.add('sidebar--mobile-open');
        backdrop.classList.add('sidebar-backdrop--visible');
        // Swap chevron to X
        collapseBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 4L4 12M4 4l8 8"/></svg>';
        collapseBtn.onclick = closeMobileSidebar;
    }

    function closeMobileSidebar() {
        var sidebar = document.getElementById('sidebar');
        var backdrop = document.getElementById('backdrop');
        var collapseBtn = document.getElementById('collapseBtn');
        sidebar.classList.remove('sidebar--mobile-open');
        backdrop.classList.remove('sidebar-backdrop--visible');
        // Restore chevron
        collapseBtn.innerHTML = '<svg id="chevronIcon" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10 12L6 8l4-4"/></svg>';
        collapseBtn.onclick = toggleSidebar;
    }
</script>
